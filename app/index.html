<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>SOS Hauteur | Travaux en hauteur et accès difficile</title>

    <meta
      name="description"
      content="SOS Hauteur est spécialisée dans les travaux en hauteur, accès difficile, nettoyage, maintenance et interventions par cordistes professionnels."
    />

    <meta
      name="keywords"
      content="SOS Hauteur, cordiste, travaux en hauteur, accès difficile, nettoyage façade, maintenance bâtiment, cordistes professionnels"
    />

    <meta name="author" content="SOS Hauteur" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://soshauteur.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Open Graph (Facebook / LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SOS Hauteur" />
    <meta property="og:title" content="SOS Hauteur | Travaux en hauteur et accès difficile" />
    <meta
      property="og:description"
      content="Experts en travaux en hauteur, accès difficile et interventions par cordistes professionnels."
    />
    <meta property="og:url" content="https://soshauteur.com/" />
    <meta property="og:image" content="https://soshauteur.com/logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SOS Hauteur | Travaux en hauteur et accès difficile" />
    <meta
      name="twitter:description"
      content="Entreprise spécialisée dans les travaux en hauteur et interventions par cordistes professionnels."
    />
    <meta name="twitter:image" content="https://soshauteur.com/logo.png" />

    <!-- Google Local Business SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "SOS Hauteur",
      "image": "https://soshauteur.com/logo.png",
      "url": "https://soshauteur.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Casablanca",
        "addressCountry": "MA"
      },
      "areaServed": "Maroc",
      "description": "Entreprise spécialisée dans les travaux en hauteur et accès difficile avec cordistes professionnels."
    }
    </script>

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
